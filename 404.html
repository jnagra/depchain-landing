<!DOCTYPE html>
<html lang="en">
<head>

<title>DepChain — Page Not Found</title>
<meta name="robots" content="noindex">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;
  --white:#fff;
  --gray:#a0a0a0;
  --border:#1a1a1a;
}
body{
  min-height:100vh;
  background:var(--black);
  color:var(--white);
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  display:grid;
  place-items:center;
  padding:32px;
}
.wrap{
  width:min(840px,100%);
  text-align:center;
}
.logo{
  display:inline-flex;
  align-items:center;
  gap:12px;
  margin-bottom:40px;
}
.logo span{
  font-family:'IBM Plex Mono',monospace;
  letter-spacing:4px;
  font-size:13px;
  color:var(--gray);
}
h1{
  font-size:clamp(42px,8vw,92px);
  line-height:1;
  letter-spacing:-2px;
  font-weight:800;
  margin-bottom:18px;
}
p{
  color:var(--gray);
  font-size:16px;
  margin-bottom:36px;
}
a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--border);
  padding:12px 24px;
  font-size:13px;
  font-weight:600;
  letter-spacing:.4px;
  text-decoration:none;
  color:var(--white);
  transition:border-color .2s,color .2s;
}
a:hover{
  border-color:#333;
  color:#f5f5f5;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 64 64" fill="none">

        <line x1="32" y1="32" x2="52" y2="16" stroke="#fff" stroke-width=".6" opacity=".3"/><circle cx="52" cy="16" r="1.5" fill="#fff" opacity=".4"/>
        <line x1="32" y1="32" x2="54" y2="32" stroke="#fff" stroke-width=".6" opacity=".3"/><circle cx="54" cy="32" r="1.5" fill="#fff" opacity=".4"/>
        <line x1="32" y1="32" x2="52" y2="48" stroke="#fff" stroke-width=".6" opacity=".3"/><circle cx="52" cy="48" r="1.5" fill="#fff" opacity=".4"/>

        <line x1="32" y1="32" x2="10" y2="32" stroke="#fff" stroke-width=".6" opacity=".3"/><circle cx="10" cy="32" r="1.5" fill="#fff" opacity=".4"/>
        <line x1="32" y1="32" x2="12" y2="16" stroke="#fff" stroke-width=".6" opacity=".3"/><circle cx="12" cy="16" r="1.5" fill="#fff" opacity=".4"/>
        <polygon points="32,20 34.4,27.2 42,27.2 36,31.6 38.2,39 32,34.4 25.8,39 28,31.6 22,27.2 29.6,27.2" fill="#fff"/>
      </svg>
      <span>DEPCHAIN</span>
    </div>
    <h1>Page not found</h1>

    <a href="/">Back to home</a>
