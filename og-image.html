<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>DepChain OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Inter:wght@400;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 1200px;
  height: 630px;
}

body {
  background: #050505;
  font-family: "Inter", sans-serif;
}

.canvas {
  width: 1200px;
  height: 630px;
  position: relative;
  padding: 80px;
  background: #050505;
  overflow: hidden;
}

.top {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 40px;
  height: 40px;
  flex: 0 0 40px;
}

.brand {
  font-family: "IBM Plex Mono", monospace;
  font-size: 13px;
  letter-spacing: 4px;
  color: #666;
}

.main {
  margin-top: 132px;
}

.headline {
  font-size: 48px;
  font-weight: 800;
  line-height: 1.08;
  color: #fff;
}

.headline-red {
  margin-top: 4px;
  font-size: 48px;
  font-weight: 800;
  line-height: 1.08;
  color: #c8102e;
}

.sub {
  margin-top: 24px;
  font-size: 16px;
  color: #666;
}

.trace {
  position: absolute;
  right: 80px;
  bottom: 80px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.trace-rail {
  display: flex;
  align-items: center;
}

.trace-box {
  width: 12px;
  height: 8px;
  border: 1px solid #333;
}

.trace-line {
  width: 14px;
  height: 1px;
  background: #333;
}

.trace-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 8px;
  color: #333;
  letter-spacing: 0.2px;
}
</style>
</head>
<body>
  <div class="canvas">
    <div class="top">
      <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <g stroke="white" stroke-opacity="0.3" stroke-width="1" fill="white" fill-opacity="0.3">
          <line x1="32" y1="30" x2="32" y2="8"></line><circle cx="32" cy="8" r="1.5"></circle>
          <line x1="32" y1="30" x2="50" y2="14"></line><circle cx="50" cy="14" r="1.5"></circle>
          <line x1="32" y1="30" x2="56" y2="30"></line><circle cx="56" cy="30" r="1.5"></circle>
          <line x1="32" y1="30" x2="50" y2="48"></line><circle cx="50" cy="48" r="1.5"></circle>
          <line x1="32" y1="30" x2="32" y2="56"></line><circle cx="32" cy="56" r="1.5"></circle>
          <line x1="32" y1="30" x2="14" y2="48"></line><circle cx="14" cy="48" r="1.5"></circle>
          <line x1="32" y1="30" x2="8" y2="30"></line><circle cx="8" cy="30" r="1.5"></circle>
          <line x1="32" y1="30" x2="14" y2="14"></line><circle cx="14" cy="14" r="1.5"></circle>
        </g>
        <polygon points="32,20 34.4,27.2 42,27.2 36,31.6 38.2,39 32,34.4 25.8,39 28,31.6 22,27.2 29.6,27.2" fill="white"></polygon>
      </svg>
      <div class="brand">DEPCHAIN</div>
    </div>

    <div class="main">
      <div class="headline">Your drones depend on China.</div>
      <div class="headline-red">You can't see it.</div>
      <div class="sub">Supply chain visibility for defense drones</div>
    </div>

    <div class="trace">
      <div class="trace-rail">
        <div class="trace-box"></div>
        <div class="trace-line"></div>
        <div class="trace-box"></div>
        <div class="trace-line"></div>
        <div class="trace-box"></div>
      </div>
      <div class="trace-label">CN → JP → US</div>
    </div>
  </div>
</body>
</html>
